<!DOCTYPE html>
<html>
<head>
    <title>Privat</title>
    <meta charset="UTF-8">

    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }

        .box {
            width: 800px;
            margin: auto;
            background: white;
            border: 2px solid black;
            padding: 10px;
        }

        .top {
            display: flex;
            justify-content: space-between;
        }

        .banner {
            border: 2px solid black;
            text-align: center;
            font-size: 50px;
            padding: 30px;
            margin: 20px 0;
        }

        .cards {
            display: flex;
            justify-content: space-between;
        }

        .card {
            width: 30%;
            background: limegreen;
            border: 2px solid black;
            padding: 15px;
            text-align: center;
        }

        .footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

<div class="box">

    <h3>Privat</h3>

    <div class="top">
        <div>Hjem</div>
        <div>
            <button>Forside</button>
            <button>Log ud</button>
        </div>
    </div>

    <button>Tilbage</button>

    <div class="banner">
        sjov phrase
    </div>

    <div class="cards">
        <div class="card">
            <h4>Opskrifter</h4>
            <p>Find personlige opskrifter her</p>
        </div>

        <div class="card">
            <h4>Nyheder/Events</h4>
            <p>Følg med fremtidige events og opslag her</p>
        </div>

        <div class="card">
            <h4>Butikker med overskudsvarer</h4>
            <p>Find butikker med overskudsvarer her</p>
        </div>
    </div>

    <div class="footer">
        <button>Kontakt info</button>
        <button>Sociale medier</button>
    </div>

</div>

</body>
</html>
