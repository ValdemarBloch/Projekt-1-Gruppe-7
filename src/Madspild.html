<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Privat</title>

    <style>
        /* SUPER BASIC STYLING */
        body {
          margin: 0;
          font-family: Arial, sans-serif;
          background: #f2f2f2;
        }

        /* "Vindue" som i wireframe */
        .window {
          width: 900px;
          margin: 30px auto;
          background: white;
          border: 2px solid #444;
        }

        /* Top bjælke med titel og X */
        .titlebar {
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding: 6px 10px;
          background: #ddd;
          border-bottom: 2px solid #444;
          font-size: 14px;
        }

        .titlebar .x {
          width: 18px;
          height: 18px;
          border: 2px solid #444;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: bold;
          background: #eee;
        }

        /* Indhold */
        .content {
          padding: 15px;
        }

        /* Top navigation (Hjem + Forside/Log ud) */
        .toprow {
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 10px;
        }

        .small-box {
          border: 2px solid #666;
          padding: 6px 10px;
          background: #eee;
          font-size: 14px;
          min-width: 70px;
          text-align: left;
        }

        .right-buttons button {
          margin-left: 8px;
          padding: 6px 14px;
          border: 2px solid #666;
          background: #eee;
          cursor: pointer;
        }

        /* Tilbage knap */
        .backbtn {
          margin: 10px 0 15px 0;
        }

        .backbtn button {
          padding: 6px 18px;
          border: 2px solid #666;
          background: #eee;
          cursor: pointer;
        }

        /* Banner-område */
        .banner-area {
          border: 2px solid #666;
          height: 170px;
          position: relative;
          background: #fafafa;
          margin-bottom: 30px;
          overflow: hidden;
        }

        /* “Trekanter” til siderne (meget simpelt) */
        .banner-left,
        .banner-right {
          position: absolute;
          top: 0;
          width: 260px;
          height: 100%;
        }

        .banner-left {
          left: 0;
          background: linear-gradient(135deg, transparent 49%, #666 50%, transparent 51%);
        }

        .banner-right {
          right: 0;
          background: linear-gradient(225deg, transparent 49%, #666 50%, transparent 51%);
        }

        /* Midter-boks med "sjov phrase" */
        .banner-center {
          position: absolute;
          top: 35px;
          left: 50%;
          transform: translateX(-50%);
          width: 520px;
          height: 100px;
          border: 2px solid #666;
          background: white;
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 64px;
          font-family: "Comic Sans MS", Arial, sans-serif; /* lidt sjovt */
        }

        /* 3 grønne bokse */
        .cards {
          display: flex;
          justify-content: space-between;
          gap: 20px;
          margin-bottom: 40px;
        }

        .card {
          flex: 1;
          border: 2px solid #444;
          background: #19c300;
          padding: 18px;
          min-height: 120px;
          text-align: center;
        }

        .card h3 {
          margin: 0 0 12px 0;
          font-size: 18px;
        }

        .card p {
          margin: 0;
          font-size: 13px;
        }

        /* Footer */
        .footer {
          border-top: 2px solid #444;
          padding: 10px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          background: #eee;
        }

        .footer button {
          padding: 6px 14px;
          border: 2px solid #666;
          background: #f6f6f6;
          cursor: pointer;
        }
    </style>
</head>

<body>
<div class="window">
    <div class="titlebar">
        <div>Privat</div>
        <div class="x">X</div>
    </div>

    <div class="content">
        <div class="toprow">
            <div class="small-box">Hjem</div>

            <div class="right-buttons">
                <button>Forside</button>
                <button>Log ud</button>
            </div>
        </div>

        <div class="backbtn">
            <button>Tilbage</button>
        </div>

        <div class="banner-area">
            <div class="banner-left"></div>
            <div class="banner-right"></div>
            <div class="banner-center">sjov phrase</div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Opskrifter</h3>
                <p>Find personlige opskrifter her</p>
            </div>

            <div class="card">
                <h3>Nyheder/Events</h3>
                <p>Følg med fremtidige events og opslag her!</p>
            </div>

            <div class="card">
                <h3>Butikker med overskudsvarer</h3>
                <p>Find butikker med overskudsvarer her!</p>
            </div>
        </div>
    </div>

    <div class="footer">
        <button>Kontakt info</button>
        <button>Sociale medier</button>
    </div>
</div>
</body>
</html>
